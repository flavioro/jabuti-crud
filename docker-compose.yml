services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jabuti_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: jabuti_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jabuti_users}
      POSTGRES_USER: ${POSTGRES_USER:-jabuti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jabuti}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jabuti} -d ${POSTGRES_DB:-jabuti_users}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    container_name: jabuti_cache
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
