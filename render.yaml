services:
  - type: web
    name: jabuti-users-api
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: jabuti-users-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: jabuti-users-cache
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: jabuti-users-cache
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: keyvalue
          name: jabuti-users-cache
          property: password

databases:
  - name: jabuti-users-db
    databaseName: jabuti_users
    plan: free

keyvalue:
  - name: jabuti-users-cache
    plan: free
